<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MediCare HMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{--sidebar:#0a2540;--accent:#4ea8de}
body{background:#f4f7fb;font-family:'Segoe UI',sans-serif}
.auth-wrap{min-height:100vh;background:linear-gradient(135deg,#0a2540 0,#1a6fba 100%);display:flex;align-items:center;justify-content:center}
.auth-box{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:430px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.auth-box .logo{font-size:1.4rem;font-weight:700;color:#0a2540}
.auth-box .logo span{color:#0d6efd}
.role-tabs .nav-link{border-radius:50px;color:#666;font-weight:500}
.role-tabs .nav-link.active{background:#0d6efd;color:#fff}
#sidebar{width:256px;min-height:100vh;background:#0a2540;color:#cdd9e5;position:fixed;top:0;left:0;z-index:100;display:flex;flex-direction:column;}
#sidebar .brand{padding:20px 22px;font-size:1.25rem;font-weight:700;color:#fff;border-bottom:1px solid #1e3a5f}
#sidebar .brand span{color:#4ea8de}
#sidebar .nav-link{color:#cdd9e5;padding:11px 22px;border-radius:8px;margin:2px 10px;font-size:.9rem;display:block;text-decoration:none;}
#sidebar .nav-link:hover,#sidebar .nav-link.active{background:#1a3f6f;color:#fff}
#sidebar .sec-lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;padding:18px 22px 4px;color:#6b8cba}
#main{margin-left:256px;min-height:100vh;}
.topbar{background:#fff;padding:13px 26px;border-bottom:1px solid #e5eaf0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.content{padding:26px}
.stat-card{border:none;border-radius:14px;padding:22px;color:#fff;box-shadow:0 4px 18px rgba(0,0,0,.1)}
.stat-card .val{font-size:2rem;font-weight:700}
.stat-card .lbl{font-size:.8rem;opacity:.85}
.bg-c1{background:linear-gradient(135deg,#0d6efd,#4ea8de)}
.bg-c2{background:linear-gradient(135deg,#198754,#20c997)}
.bg-c3{background:linear-gradient(135deg,#fd7e14,#ffc107)}
.bg-c4{background:linear-gradient(135deg,#dc3545,#e07b9a)}
.hms-table th{font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;background:#f8faff}
.rx-card{border-radius:12px;border:2px dashed #cde;background:#f7fbff}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999}
@media(max-width:768px){#sidebar{display:none}#main{margin-left:0}}
</style>
</head>
<body>

<!-- ROLE SELECT -->
<div id="role-screen" class="auth-wrap">
  <div class="text-center">
    <div class="text-white mb-5">
      <i class="bi bi-hospital" style="font-size:3.5rem;color:#4ea8de"></i>
      <h1 class="fw-bold mt-2">MediCare HMS</h1>
      <p class="opacity-75 mb-0">Select your role to continue</p>
    </div>
    <div class="d-flex flex-wrap gap-4 justify-content-center">
      <div class="bg-white rounded-4 p-4 text-center" style="cursor:pointer;width:160px;box-shadow:0 8px 28px rgba(0,0,0,.2)" onclick="showAuth('admin')">
        <i class="bi bi-shield-lock-fill text-primary mb-2" style="font-size:2.3rem"></i>
        <h6 class="fw-bold mb-0">Admin</h6><small class="text-muted">Full Access</small>
      </div>
      <div class="bg-white rounded-4 p-4 text-center" style="cursor:pointer;width:160px;box-shadow:0 8px 28px rgba(0,0,0,.2)" onclick="showAuth('doctor')">
        <i class="bi bi-heart-pulse-fill text-success mb-2" style="font-size:2.3rem"></i>
        <h6 class="fw-bold mb-0">Doctor</h6><small class="text-muted">Appointments & Rx</small>
      </div>
      <div class="bg-white rounded-4 p-4 text-center" style="cursor:pointer;width:160px;box-shadow:0 8px 28px rgba(0,0,0,.2)" onclick="showAuth('patient')">
        <i class="bi bi-person-heart text-warning mb-2" style="font-size:2.3rem"></i>
        <h6 class="fw-bold mb-0">Patient</h6><small class="text-muted">Book & View</small>
      </div>
      <div class="bg-white rounded-4 p-4 text-center" style="cursor:pointer;width:160px;box-shadow:0 8px 28px rgba(0,0,0,.2)" onclick="showAuth('receptionist')">
  <i class="bi bi-person-badge-fill text-purple mb-2" style="font-size:2.3rem;color:#6f42c1"></i>
  <h6 class="fw-bold mb-0">Reception</h6>
  <small class="text-muted">OPD & Registration</small>
</div>
    </div>
  </div>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-wrap" style="display:none">
  <div class="auth-box">
    <div class="logo text-center mb-3">Medi<span>Care</span> HMS</div>
    <div id="auth-role-badge" class="text-center mb-3"></div>
    <ul class="nav role-tabs nav-pills justify-content-center mb-4" id="auth-tabs" style="display:none!important"></ul>
    <div id="form-login">
      <h5 class="fw-bold mb-3 text-center" id="login-title">Login</h5>
      <form onsubmit="doLogin(event)">
        <div class="mb-3"><label class="form-label fw-semibold">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required></div>
        <div class="mb-3"><label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <input type="password" id="login-pass" class="form-control" required>
            <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('login-pass')"><i class="bi bi-eye"></i></button>
          </div></div>
        <div id="login-err" class="alert alert-danger py-2 d-none"></div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold" id="login-btn">
          <span class="spinner-border spinner-border-sm me-1 d-none" id="login-spin"></span>Login
        </button>
      </form>
    </div>
    <div id="form-register" style="display:none">
      <h5 class="fw-bold mb-3 text-center">Create Account</h5>
      <form onsubmit="doRegister(event)">
        <div class="row g-2 mb-2">
          <div class="col"><label class="form-label fw-semibold">Full Name</label><input type="text" id="reg-name" class="form-control" required></div>
          <div class="col"><label class="form-label fw-semibold">Age</label><input type="number" id="reg-age" class="form-control" min="1" max="120"></div>
        </div>
        <div class="mb-2"><label class="form-label fw-semibold">Email</label><input type="email" id="reg-email" class="form-control" required></div>
        <div class="row g-2 mb-2">
          <div class="col"><label class="form-label fw-semibold">Phone</label><input type="tel" id="reg-phone" class="form-control"></div>
          <div class="col"><label class="form-label fw-semibold">Blood Group</label>
            <select id="reg-blood" class="form-select">
              <option value="">--</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
            </select></div>
        </div>
        <div class="mb-3"><label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <input type="password" id="reg-pass" class="form-control" minlength="6" required>
            <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('reg-pass')"><i class="bi bi-eye"></i></button>
          </div></div>
        <div id="reg-err" class="alert alert-danger py-2 d-none"></div>
        <button type="submit" class="btn btn-success w-100 fw-semibold">
          <span class="spinner-border spinner-border-sm me-1 d-none" id="reg-spin"></span>Register
        </button>
      </form>
    </div>
    <div class="text-center mt-3">
      <button class="btn btn-link btn-sm text-muted" onclick="showRoleSelect()"><i class="bi bi-arrow-left me-1"></i>Back</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap">
  <div id="toast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-semibold" id="toast-msg"></div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell" style="display:none">
  <div id="sidebar">
    <div class="brand">Medi<span>Care</span> HMS</div>
    <nav class="nav flex-column mt-1 flex-grow-1" id="sidebar-nav"></nav>
    <div class="p-3 border-top" style="border-color:#1e3a5f!important">
      <div class="d-flex align-items-center gap-2 mb-2">
        <img id="sb-avatar" src="" class="rounded-circle" width="34" height="34">
        <div>
          <div id="sb-name" class="text-white fw-semibold" style="font-size:.85rem"></div>
          <div id="sb-role" class="text-muted" style="font-size:.72rem;text-transform:capitalize"></div>
        </div>
      </div>
      <button class="btn btn-outline-danger btn-sm w-100" onclick="logout()"><i class="bi bi-box-arrow-left me-1"></i>Logout</button>
    </div>
  </div>
  <div id="main">
    <div class="topbar">
      <span class="fw-semibold text-dark" id="page-title">Dashboard</span>
      <div class="d-flex align-items-center gap-3">
        <i class="bi bi-bell text-muted fs-5"></i>
        <span class="fw-semibold small" id="topbar-user"></span>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API='/api/';
let session=JSON.parse(localStorage.getItem('hms-session')||'null');
let currentRole=session?.user?.role;
function saveSession(d){session=d;localStorage.setItem('hms-session',JSON.stringify(d));}
function clearSession(){session=null;currentRole=null;localStorage.removeItem('hms-session');}
function authHeaders(){return{'Content-Type':'application/json','Authorization':'Bearer '+session?.token};}
function toast(msg,type='success'){const el=document.getElementById('toast');el.className='toast align-items-center border-0 text-white bg-'+(type==='success'?'success':type==='error'?'danger':'primary');document.getElementById('toast-msg').textContent=msg;new bootstrap.Toast(el,{delay:3000}).show();}
let authRole;
function togglePwd(id){const el=document.getElementById(id);el.type=el.type==='password'?'text':'password';}
function show(id){document.getElementById(id).style.display='';}
function hide(id){document.getElementById(id).style.display='none';}
function showRoleSelect(){hide('auth-screen');show('role-screen');hide('app-shell');}
function showAuth(role){
  authRole=role;hide('role-screen');show('auth-screen');
  const icons = {
  admin: 'shield-lock-fill text-primary',
  doctor: 'heart-pulse-fill text-success',
  patient: 'person-heart text-warning',
  receptionist: 'person-badge-fill text-purple'
};
  document.getElementById('auth-role-badge').innerHTML=`<span class="badge bg-light text-dark border fs-6 px-3 py-2"><i class="bi bi-${icons[role]} me-2"></i>${role.charAt(0).toUpperCase()+role.slice(1)}</span>`;
  const tabs=document.getElementById('auth-tabs');
  if(role==='patient'){tabs.style.removeProperty('display');tabs.innerHTML=`<li class="nav-item"><a class="nav-link active" href="#" onclick="switchAuthTab('login',this)">Login</a></li><li class="nav-item"><a class="nav-link" href="#" onclick="switchAuthTab('register',this)">Register</a></li>`;}
  else{tabs.style.display='none';}
  show('form-login');hide('form-register');
  document.getElementById('login-title').textContent=role.charAt(0).toUpperCase()+role.slice(1)+' Login';
  document.getElementById('login-err').classList.add('d-none');
}
function switchAuthTab(tab,el){
  el.closest('ul').querySelectorAll('.nav-link').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('form-login').style.display=tab==='login'?'':'none';
  document.getElementById('form-register').style.display=tab==='register'?'':'none';
}
async function doLogin(e){
  e.preventDefault();
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');const spin=document.getElementById('login-spin');const err=document.getElementById('login-err');
  btn.disabled=true;spin.classList.remove('d-none');err.classList.add('d-none');
  try{
    const r=await fetch(API+authRole+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await r.json();if(!r.ok)throw new Error(data.error||'Login failed');
    saveSession(data);currentRole=data.user.role;launchApp();toast('Welcome back, '+data.user.name+'!');
  }catch(ex){err.textContent=ex.message;err.classList.remove('d-none');}
  finally{btn.disabled=false;spin.classList.add('d-none');}
}
async function doRegister(e){
  e.preventDefault();
  const body={name:document.getElementById('reg-name').value.trim(),email:document.getElementById('reg-email').value.trim(),password:document.getElementById('reg-pass').value,age:document.getElementById('reg-age').value,phone:document.getElementById('reg-phone').value,blood:document.getElementById('reg-blood').value};
  const spin=document.getElementById('reg-spin');const err=document.getElementById('reg-err');
  spin.classList.remove('d-none');err.classList.add('d-none');
  try{
    const r=await fetch(API+'patient/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await r.json();if(!r.ok)throw new Error(data.error||'Registration failed');
    saveSession(data);currentRole='patient';launchApp();toast('Account created! Welcome to MediCare.');
  }catch(ex){err.textContent=ex.message;err.classList.remove('d-none');}
  finally{spin.classList.add('d-none');}
}
const menus = {
  admin: [
    { icon: 'speedometer2', label: 'Dashboard', key: 'admin-dash' },
    { icon: 'people-fill', label: 'Doctors', key: 'admin-doctors' },
    { icon: 'person-badge-fill', label: 'Receptionists', key: 'admin-receptionists' },
    { icon: 'person-lines-fill', label: 'Patients', key: 'admin-patients' },
    { icon: 'calendar-check-fill', label: 'Appointments', key: 'admin-appts' },
    { icon: 'receipt', label: 'Billing', key: 'admin-billing' },
    { icon: 'file-earmark-arrow-up', label: 'Reports', key: 'admin-reports' },
    { icon: 'clipboard2-pulse-fill', label: 'OPD Records', key: 'admin-opd' },
  ],
  doctor: [
    { icon: 'speedometer2', label: 'Dashboard', key: 'doc-dash' },
    { icon: 'calendar-check-fill', label: 'Appointments', key: 'doc-appts' },
    { icon: 'file-medical-fill', label: 'Prescriptions', key: 'doc-rx' },
    { icon: 'file-earmark-arrow-up', label: 'Upload Report', key: 'doc-reports' },
    { icon: 'clipboard2-pulse-fill', label: 'OPD Patients', key: 'doc-opd' },
  
  ],
  patient:[
    {icon:'speedometer2',label:'Dashboard',key:'pat-dash'},
    {icon:'calendar-plus-fill',label:'Book Appointment',key:'pat-book'},
    {icon:'file-earmark-medical',label:'My Reports',key:'pat-reports'},
    {icon:'file-medical-fill',label:'My Prescriptions',key:'pat-rx'},
  ],
  receptionist: [
  { icon: 'speedometer2', label: 'Dashboard', key: 'rec-dash' },
  { icon: 'clipboard2-pulse-fill', label: 'New OPD', key: 'rec-opd' },
  { icon: 'list-ul', label: 'OPD List', key: 'rec-opd-list' },
]
};
function launchApp(){
  hide('role-screen');hide('auth-screen');show('app-shell');
  const u=session.user;
  document.getElementById('sb-name').textContent=u.name;
  document.getElementById('sb-role').textContent=u.role;
  document.getElementById('topbar-user').textContent=u.name;
  document.getElementById('sb-avatar').src='https://ui-avatars.com/api/?name='+encodeURIComponent(u.name)+'&background=0d6efd&color=fff&size=36';
  buildSidebar();renderPage(menus[currentRole][0].key);
}
function buildSidebar(){
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML=`<div class="sec-lbl">${currentRole} Panel</div>`;
  menus[currentRole].forEach(m=>{
    const a=document.createElement('a');a.href='#';a.className='nav-link';
    a.innerHTML=`<i class="bi bi-${m.icon} me-2"></i>${m.label}`;
    a.onclick=e=>{e.preventDefault();renderPage(m.key);};nav.appendChild(a);
  });
}
function setActiveNav(key){document.querySelectorAll('#sidebar-nav .nav-link').forEach((a,i)=>a.classList.toggle('active',menus[currentRole][i]?.key===key));}
function logout(){clearSession();hide('app-shell');showRoleSelect();}
const titles = {
  'admin-dash': 'Dashboard',
  'admin-doctors': 'Manage Doctors',
  'admin-receptionists': 'Manage Receptionists',
  'admin-patients': 'Patients',
  'admin-appts': 'Appointments',
  'admin-billing': 'Billing',
  'admin-reports': 'Manage Reports',
  'admin-opd': 'OPD Records',
  'doc-dash': 'Dashboard',
  'doc-appts': 'My Appointments',
  'doc-rx': 'Prescriptions',
  'doc-reports': 'Upload Report',
  'doc-opd': 'OPD Patients',
  'pat-dash': 'Dashboard',
  'pat-book': 'Book Appointment',
  'pat-reports': 'My Reports',
  'pat-rx': 'My Prescriptions',
  'rec-dash': 'Reception Dashboard',
  'rec-opd': 'New OPD Registration',
  'rec-opd-list': 'OPD List'
};
async function renderPage(key){
  setActiveNav(key);
  document.getElementById('page-title').textContent=titles[key]||key;
  const c=document.getElementById('content');
  c.innerHTML=`<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>`;
  try{
    switch(key){
      case 'admin-dash':c.innerHTML=await adminDash();break;
      case 'admin-doctors':c.innerHTML=await adminDoctors();break;
      case 'admin-receptionists': c.innerHTML = await adminReceptionists(); break;
      case 'admin-patients':c.innerHTML=await adminPatients();break;
      case 'admin-appts':c.innerHTML=await adminAppts();break;
      case 'admin-billing':c.innerHTML=await adminBilling();break;
      case 'admin-reports':c.innerHTML=await adminReports();break;
      case 'admin-opd': c.innerHTML = await adminOPD(); break;
      case 'doc-dash':c.innerHTML=await docDash();break;
      case 'doc-appts':c.innerHTML=await docAppts();break;
      case 'doc-rx':c.innerHTML=await docRx();break;
      case 'doc-reports':c.innerHTML=await docReports();break;
      case 'doc-opd': c.innerHTML = await docOPD(); break;
      case 'pat-dash':c.innerHTML=await patDash();break;
      case 'pat-book':c.innerHTML=await patBook();break;
      case 'pat-reports':c.innerHTML=await patReports();break;
      case 'pat-rx':c.innerHTML=await patRx();break;
      case 'rec-dash': c.innerHTML = await recDash(); break;
      case 'rec-opd': c.innerHTML = await recOPDForm(); break;
      case 'rec-opd-list': c.innerHTML = await recOPDList(); break;
    }
  }catch(ex){c.innerHTML=`<div class="alert alert-danger">${ex.message}</div>`;}
}
async function apiFetch(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:authHeaders()});
  if(r.status===401){logout();throw new Error('Session expired');}
  const d=await r.json();if(!r.ok)throw new Error(d.error||'API error');return d;
}
async function adminDash(){
  const s=await apiFetch('stats');
  setTimeout(async()=>{try{const appts=await apiFetch('appointments');document.getElementById('dash-ap').innerHTML=apptTableDoc(appts.slice(0,5));}catch(e){}},100);
  return `<div class="row g-4 mb-4">
    <div class="col-sm-6 col-xl-3"><div class="stat-card bg-c1"><div class="d-flex justify-content-between"><div><div class="lbl">Doctors</div><div class="val">${s.doctors}</div></div><i class="bi bi-people-fill" style="font-size:2.2rem;opacity:.8"></i></div></div></div>
    <div class="col-sm-6 col-xl-3"><div class="stat-card bg-c2"><div class="d-flex justify-content-between"><div><div class="lbl">Patients</div><div class="val">${s.patients}</div></div><i class="bi bi-person-heart" style="font-size:2.2rem;opacity:.8"></i></div></div></div>
    <div class="col-sm-6 col-xl-3"><div class="stat-card bg-c3"><div class="d-flex justify-content-between"><div><div class="lbl">Appointments</div><div class="val">${s.appointments}</div></div><i class="bi bi-calendar-check" style="font-size:2.2rem;opacity:.8"></i></div></div></div>
    <div class="col-sm-6 col-xl-3"><div class="stat-card bg-c4"><div class="d-flex justify-content-between"><div><div class="lbl">Revenue</div><div class="val">&#8377;${Number(s.revenue).toLocaleString()}</div></div><i class="bi bi-cash-coin" style="font-size:2.2rem;opacity:.8"></i></div></div></div>
  </div>
  <div class="row g-4">
    <div class="col-md-8"><div class="card border-0 shadow-sm rounded-4"><div class="card-header bg-white fw-semibold border-0 pt-3">Recent Appointments</div><div class="card-body p-0" id="dash-ap"><div class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div></div></div></div></div>
    <div class="col-md-4"><div class="card border-0 shadow-sm rounded-4 h-100"><div class="card-header bg-white fw-semibold border-0 pt-3">Quick Actions</div><div class="card-body d-flex flex-column gap-2">
      <button class="btn btn-primary" onclick="renderPage('admin-doctors')"><i class="bi bi-plus-circle me-2"></i>Add Doctor</button>
      <button class="btn btn-success" onclick="renderPage('admin-patients')"><i class="bi bi-people me-2"></i>View Patients</button>
      <button class="btn btn-warning text-dark" onclick="renderPage('admin-appts')"><i class="bi bi-calendar-check me-2"></i>Appointments</button>
      <button class="btn btn-danger" onclick="renderPage('admin-billing')"><i class="bi bi-receipt me-2"></i>Billing</button>
      <button class="btn btn-info text-white" onclick="renderPage('admin-reports')"><i class="bi bi-file-earmark-arrow-up me-2"></i>Upload Report</button>
    </div></div></div>
  </div>`;
}
async function adminDoctors(){
  const docs=await apiFetch('doctors');
  const rows=docs.map(d=>`<tr>
    <td><img src="https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}&background=0d6efd&color=fff&size=30" class="rounded-circle me-2" width="30">${d.name}</td>
    <td>${d.speciality||'-'}</td><td>${d.phone||'-'}</td><td>${d.email}</td>
    <td><span class="badge bg-${d.status==='Active'?'success':'secondary'}">${d.status}</span></td>
    <td>
      <button class="btn btn-sm btn-outline-primary me-1" onclick="editDoctorModal(${d.id},'${d.name}','${d.speciality||''}','${d.phone||''}','${d.email}','${d.status}')"><i class="bi bi-pencil"></i></button>

function calcTotal() {
  const c = parseFloat(document.getElementById('opd-cfee').value) || 0;
  const r = parseFloat(document.getElementById('opd-rfee').value) || 0;
  document.getElementById('opd-total').value = c + r;
  calcBalance();
}

function calcBalance() {
  const total = parseFloat(document.getElementById('opd-total').value) || 0;
  const paid = parseFloat(document.getElementById('opd-paid').value) || 0;
  document.getElementById('opd-balance').value = total - paid;
}

async function uploadReport(e,role){
  e.preventDefault();
  const fd=new FormData();
  fd.append('patient_id',document.getElementById('rpt-patient').value);
  fd.append('test',document.getElementById('rpt-test').value);
  fd.append('date',document.getElementById('rpt-date').value);
  fd.append('file',document.getElementById('rpt-file').files[0]);
  const r=await fetch(API+'reports/upload',{method:'POST',headers:{Authorization:'Bearer '+session.token},body:fd});
  const d=await r.json();
  if(!r.ok){toast(d.error,'error');return;}
  toast('Report uploaded successfully!');
  renderPage(role==='doctor'?'doc-reports':'admin-reports');
}
